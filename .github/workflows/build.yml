name: Build

on:
  push:
    branches: [main]
    paths:
      - 'configs/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: openwrt

      - name: Install deps
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison gperf texinfo \
            libncurses-dev python3 libssl-dev gettext zlib1g-dev \
            git curl unzip gawk diffutils xz-utils bc automake \
            ccache libtool m4 python3-pyelftools

      - name: Build
        run: |
          # 仓库已检出到 $GITHUB_WORKSPACE/openwrt/
          REPO=$GITHUB_WORKSPACE/openwrt
          cd $REPO
          
          echo "Repo: $REPO"

          # .feeds.conf 在仓库根目录（$REPO/.feeds.conf）
          cp $REPO/.feeds.conf $REPO/feeds.conf

          # 更新并安装 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 复制设备配置
          cp $REPO/configs/nsy_g68-plus.config .config

          # 生成完整配置
          make defconfig
          make oldconfig MAKEFLAGS=-y

          # 禁用 ruby
          sed -i 's/^CONFIG_PACKAGE_ruby=.*/# CONFIG_PACKAGE_ruby is not set/' .config
          sed -i '/^CONFIG_PACKAGE_ruby-/s/=y/=n/' .config

          # 禁用 rust
          sed -i 's/^CONFIG_PACKAGE_rust=.*/# CONFIG_PACKAGE_rust is not set/' .config
          sed -i '/CONFIG_RUST_SCCACHE/d' .config

          # 强制启用 LuCI
          sed -i '/^CONFIG_PACKAGE_luci=.*/d' .config
          echo "CONFIG_PACKAGE_luci=y" >> .config

          # 强制启用 istore
          sed -i '/^CONFIG_PACKAGE_luci-app-store=.*/d' .config
          echo "CONFIG_PACKAGE_luci-app-store=y" >> .config

          # 验证配置
          grep "CONFIG_TARGET_rockchip_armv8_DEVICE_nsy_g68-plus=y" .config && echo "✅ 设备配置正确"
          grep -F "CONFIG_PACKAGE_luci-app-store=y" .config && echo "✅ istore 已配置"
          grep -F "CONFIG_PACKAGE_luci=y" .config && echo "✅ LuCI 已配置"
          grep "CONFIG_PACKAGE_rust is not set" .config && echo "✅ rust 已禁用"

          # 下载并编译
          make download -j8
          make -j1 world

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
