name: Build

on:
  push:
    branches: [main]
    paths:
      - 'configs/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    
    steps:
      - uses: actions/checkout@v4
        with:
          path: openwrt

      - name: Install deps
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison gperf texinfo \
            libncurses-dev python3 libssl-dev gettext zlib1g-dev \
            git curl unzip gawk diffutils xz-utils bc automake \
            ccache libtool m4 python3-pyelftools

      - name: Build
        run: |
          REPO=$GITHUB_WORKSPACE/openwrt
          cd $REPO
          
          echo "Repo: $REPO"
          echo "SHA256: $(sha256sum $REPO/configs/nsy_g68-plus.config | cut -c1-64)"

          # 复制设备配置
          cp $REPO/configs/nsy_g68-plus.config .config

          # 禁用 rust（必须在 defconfig 之前）
          sed -i '/^CONFIG_RUST[=_]/d' .config
          echo "# CONFIG_RUST is not set" >> .config
          echo "Rust 已禁用"

          # 生成完整配置（关键：必须先 defconfig 再 oldconfig）
          make defconfig
          make oldconfig MAKEFLAGS=-y

          # 再次禁用 rust（防止 oldconfig 重新启用）
          sed -i '/^CONFIG_RUST[=_]/d' .config
          echo "# CONFIG_RUST is not set" >> .config

          # 强制启用 LuCI 和 istore
          sed -i '/CONFIG_PACKAGE_luci-app-store/d' .config
          echo "CONFIG_PACKAGE_luci-app-store=y" >> .config

          # 验证
          echo "=== 配置验证 ==="
          grep "CONFIG_TARGET_rockchip_armv8_DEVICE_nsy_g68-plus=y" .config && echo "✅ 设备正确" || echo "❌ 设备缺失"
          (grep -E "^CONFIG_RUST[=_]" .config | grep -v "^#") && echo "❌ rust 启用" || echo "✅ rust 禁用"
          grep "CONFIG_PACKAGE_luci-app-store=y" .config && echo "✅ istore 启用" || echo "❌ istore 未启用"

          make download -j8
          make -j1 world

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.run_number }}
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
